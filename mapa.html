<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de Misión — Escape Room Algebraico</title>

  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }

    :root {
      --bg:        #0a0c10;
      --surface:   #0f1117;
      --surface-2: #151820;
      --border:    rgba(255,255,255,0.07);
      --accent:    #38BDF8;
      --accent-2:  #818CF8;
      --gold:      #F59E0B;
      --green:     #34D399;
      --pink:      #F472B6;
      --red:       #F87171;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --font-body: 'Satoshi', sans-serif;
      --font-mono: 'Orbitron', monospace;
      --radius:    12px;
      --radius-lg: 20px;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex; flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Fondo ─────────────────────────────────────────── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
        linear-gradient(90deg,rgba(56,189,248,0.03) 1px,transparent 1px);
      background-size: 60px 60px; pointer-events: none;
    }
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 20%,rgba(56,189,248,0.05) 0%,transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 80%,rgba(129,140,248,0.04) 0%,transparent 60%);
      pointer-events: none;
      animation: glow-pulse 8s ease-in-out infinite alternate;
    }
    @keyframes glow-pulse { 0%{opacity:.6} 100%{opacity:1} }

    /* ── Header ────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.5rem;
      background: rgba(10,12,16,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .header-left {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .header-logo {
      font-family: var(--font-mono); font-size: 0.8rem;
      font-weight: 700; letter-spacing: 0.08em;
      color: var(--accent);
    }
    .header-sep {
      width: 1px; height: 20px;
      background: var(--border);
    }
    .header-title {
      font-size: 0.82rem; color: var(--muted);
      font-weight: 500;
    }

    /* Reloj y progreso */
    .header-right {
      display: flex; align-items: center; gap: 1rem;
    }
    .clock-wrap {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 0.9rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
    }
    .clock-icon { font-size: 0.9rem; }
    #clock {
      font-family: var(--font-mono); font-size: 0.95rem;
      font-weight: 700; color: var(--green);
      letter-spacing: 0.06em;
      transition: color 0.3s ease;
      min-width: 5ch;
    }
    #clock.warning { color: var(--gold); }
    #clock.danger  { color: var(--red); animation: tick-danger 0.5s ease-in-out infinite alternate; }
    @keyframes tick-danger { from{opacity:1} to{opacity:0.5} }

    #penalizacion-txt {
      font-size: 0.72rem; color: var(--red);
      font-family: var(--font-mono);
      font-weight: 700;
    }
    #penalizacion-txt.hidden { display: none; }

    .progreso-wrap {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.8rem; color: var(--muted);
    }
    #progress-txt {
      font-family: var(--font-mono); font-size: 0.8rem;
      color: var(--accent); font-weight: 700;
    }
    .barra-outer {
      width: 80px; height: 6px;
      background: var(--surface-2);
      border-radius: 999px; overflow: hidden;
    }
    #progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 999px;
      transition: width 0.6s ease;
    }

    /* ── Main ──────────────────────────────────────────── */
    main {
      position: relative; z-index: 1; flex: 1;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem 3rem;
      gap: 2rem;
    }

    /* ── Título sección ────────────────────────────────── */
    .mapa-header {
      text-align: center;
      animation: fade-up 0.6s ease both;
    }
    .mapa-eyebrow {
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 0.5rem;
    }
    .mapa-titulo {
      font-family: var(--font-mono);
      font-size: clamp(1.3rem, 3vw, 2rem);
      font-weight: 900; color: var(--text);
    }
    .mapa-sub {
      margin-top: 0.4rem; font-size: 0.88rem; color: var(--muted);
    }
    @keyframes fade-up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    /* ── Camino del mapa ───────────────────────────────── */
    .mapa-path {
      width: 100%; max-width: 720px;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
    }

    /* Conector entre nodos */
    .conector {
      display: flex; align-items: center;
      flex-direction: column;
      gap: 0;
    }
    .conector-line {
      width: 3px; height: 36px;
      background: linear-gradient(180deg, var(--border) 0%, rgba(56,189,248,0.15) 100%);
      border-radius: 2px;
      transition: background 0.4s ease;
    }
    .conector-line.done {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%);
      box-shadow: 0 0 8px rgba(56,189,248,0.3);
    }
    .conector-arrow {
      font-size: 0.7rem; color: var(--muted);
      transition: color 0.3s ease;
    }
    .conector-arrow.done { color: var(--accent); }

    /* ── Nodo ──────────────────────────────────────────── */
    .nodo-wrap {
      width: 100%; max-width: 580px;
      animation: fade-up 0.5s ease both;
    }
    .nodo-wrap:nth-child(1)  { animation-delay: 0.05s; }
    .nodo-wrap:nth-child(3)  { animation-delay: 0.10s; }
    .nodo-wrap:nth-child(5)  { animation-delay: 0.15s; }
    .nodo-wrap:nth-child(7)  { animation-delay: 0.20s; }
    .nodo-wrap:nth-child(9)  { animation-delay: 0.25s; }
    .nodo-wrap:nth-child(11) { animation-delay: 0.30s; }

    /* El <a> nodo */
    a.nodo {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      text-decoration: none; color: inherit;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.3s ease;
      cursor: default;
      width: 100%;
    }

    /* ── Estado: bloqueado ── */
    a.nodo.locked {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.5);
    }

    /* ── Estado: disponible ── */
    a.nodo.active-node {
      border-color: rgba(56,189,248,0.4);
      background: linear-gradient(135deg, rgba(56,189,248,0.04), rgba(129,140,248,0.03));
      cursor: pointer;
      box-shadow: 0 0 30px rgba(56,189,248,0.08), 0 4px 20px rgba(0,0,0,0.3);
    }
    a.nodo.active-node:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 45px rgba(56,189,248,0.2), 0 8px 32px rgba(0,0,0,0.4);
      border-color: rgba(56,189,248,0.7);
    }
    a.nodo.active-node:active { transform: translateY(0); }

    /* ── Estado: completado ── */
    a.nodo.completed {
      border-color: rgba(52,211,153,0.3);
      background: linear-gradient(135deg, rgba(52,211,153,0.04), rgba(56,189,248,0.02));
      cursor: pointer;
      opacity: 0.85;
    }
    a.nodo.completed:hover {
      transform: translateY(-2px);
      border-color: rgba(52,211,153,0.6);
      box-shadow: 0 0 25px rgba(52,211,153,0.12);
      opacity: 1;
    }

    /* Icono del nodo */
    .nodo-icon {
      display: flex; align-items: center; justify-content: center;
      width: 52px; height: 52px; border-radius: 14px;
      font-size: 1.5rem; flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--surface-2);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }
    a.nodo.active-node .nodo-icon {
      background: rgba(56,189,248,0.1);
      border-color: rgba(56,189,248,0.35);
      box-shadow: 0 0 16px rgba(56,189,248,0.2);
    }
    a.nodo.completed .nodo-icon {
      background: rgba(52,211,153,0.1);
      border-color: rgba(52,211,153,0.35);
    }

    /* Contenido textual */
    .nodo-content { flex: 1; min-width: 0; }
    .nodo-eyebrow {
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.2rem;
    }
    .nodo-titulo {
      font-family: var(--font-mono); font-size: 0.9rem;
      font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow:
