  <script>
    const TOTAL_RETOS = 6;
    const DURATION_SEC = 45 * 60;

    function loadState(){
      try { return JSON.parse(sessionStorage.getItem('er-state')) || {startTime:Date.now(),resueltos:[],penalizacion:0}; }
      catch(e){ return {startTime:Date.now(),resueltos:[],penalizacion:0}; }
    }
    
    function formatTime(sec){ 
      const m=Math.floor(sec/60), s=sec%60; 
      return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); 
    }
    
    function getTiempoRestante(){ 
      const st=loadState(); 
      const elapsed=Math.floor((Date.now()-st.startTime)/1000); 
      return Math.max(0, DURATION_SEC - elapsed - (st.penalizacion||0)); 
    }

    document.addEventListener('DOMContentLoaded', () => {
      const st = loadState();
      if(!st.startTime) { window.location.href = 'index.html'; return; }

      // ─── 1. RENDERIZAR MAPA (Candados y Conectores) ───
      const resueltos = Array.isArray(st.resueltos) ? st.resueltos : [];
      const siguiente = resueltos.length + 1;

      for (let id = 1; id <= TOTAL_RETOS; id++) {
        const nodo = document.getElementById('nodo-' + id);
        if (!nodo) continue;

        nodo.classList.remove('completed', 'active-node', 'locked');
        const badge = nodo.querySelector('.nodo-status-label');

        if (resueltos.includes(id)) {
          // COMPLETADO
          nodo.classList.add('completed');
          nodo.href = 'reto.html?id=' + id;
          nodo.removeAttribute('aria-disabled');
          if (badge) {
            badge.className = 'nodo-status-label status-completed';
            badge.textContent = '✓ Completado';
          }
          // Conector previo encendido
          const lineEl = document.getElementById('line-' + id);
          const arrowEl = document.getElementById('arrow-' + id);
          if (lineEl) lineEl.classList.add('done');
          if (arrowEl) arrowEl.classList.add('done');

        } else if (id === siguiente) {
          // DISPONIBLE
          nodo.classList.add('active-node');
          nodo.href = 'reto.html?id=' + id;
          nodo.removeAttribute('aria-disabled');
          if (badge) {
            badge.className = 'nodo-status-label status-active';
            badge.textContent = id === 6 ? '🔓 ¡Misión final!' : '🔓 Disponible';
          }

        } else {
          // BLOQUEADO
          nodo.classList.add('locked');
          nodo.href = '#';
          nodo.setAttribute('aria-disabled', 'true');
          if (badge) {
            badge.className = 'nodo-status-label status-locked';
            badge.textContent = '🔒 Bloqueado';
          }
        }
      }

      // ─── 2. MANEJO DEL RELOJ Y PENALIZACIÓN ───
      const tick = () => {
        const remaining = getTiempoRestante();
        const clock = document.getElementById('clock');
        
        clock.textContent = formatTime(remaining);
        clock.classList.remove('warning','danger');
        if(remaining <= 60) clock.classList.add('danger');
        else if(remaining <= 300) clock.classList.add('warning');

        // Mostrar penalización si existe
        const penTxt = document.getElementById('penalizacion-txt');
        if(st.penalizacion > 0) {
            penTxt.classList.remove('hidden');
            penTxt.textContent = `-${formatTime(st.penalizacion)}`;
        }

        // Progreso de la barra superior
        const pct = Math.round((resueltos.length / TOTAL_RETOS) * 100);
        document.getElementById('progress-bar').style.width = pct + '%';
        document.getElementById('progress-txt').textContent = resueltos.length + '/' + TOTAL_RETOS;

        // Redirección si se acaba el tiempo o si ya terminó todo
        if(remaining <= 0 || resueltos.length >= TOTAL_RETOS) {
            window.location.href = 'cierre.html';
        }
      };
      
      tick(); 
      setInterval(tick, 1000);
    });
  </script>
</body>
</html>
