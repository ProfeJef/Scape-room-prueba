<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Misión Finalizada — Escape Room Algebraico</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="cierre-body">

  <div class="felicita-overlay hidden" id="felicita-overlay" role="dialog" style="position:fixed; inset:0; z-index:200; background:rgba(15,23,42,0.95); display:flex; align-items:center; justify-content:center;">
    <div class="felicita-box" tabindex="-1" id="felicita-box" style="background:var(--surface); border-radius:var(--radius-lg); padding:3rem; text-align:center;">
      <span class="felicita-emoji" id="felicita-emoji" aria-hidden="true" style="font-size:4rem;">🏆</span>
      <h2 id="felicita-titulo" style="color:var(--accent); margin-top:1rem;">¡MISIÓN CUMPLIDA!</h2>
      <p id="felicita-texto" style="color:var(--text-muted); margin-bottom:2rem;">Tu capacidad de análisis ha restaurado el sistema.</p>
      <button class="btn btn-primary" id="btn-felicita-ok">Ver mi informe →</button>
    </div>
  </div>

  <main style="width: 100%; max-width: 800px; display:flex; flex-direction:column; gap:1.5rem;">
    <div id="card-estado" class="cierre-card" role="main">
      <div id="cierre-icon-nivel" aria-hidden="true" style="font-size: 3rem; margin-bottom: 1rem;">🏆</div>
      <p class="state-badge success">Evaluación del Sistema</p>
      <h1 class="main-title" id="cierre-nivel">Cargando...</h1>
      <p class="cierre-message" id="cierre-mensaje">Obteniendo informe...</p>

      <div class="stats">
        <div class="stat-card">
          <span class="label">Retos Superados</span>
          <span class="value" id="cierre-resueltos" style="color:var(--success)">0 / 6</span>
        </div>
        <div class="stat-card">
          <span class="label">Tiempo Empleado</span>
          <span class="value" id="cierre-tiempo">00:00</span>
        </div>
        <div class="stat-card">
          <span class="label">Penalizaciones</span>
          <span class="value" id="cierre-penalizacion" style="color:var(--danger)">00:00</span>
        </div>
      </div>
    </div>

    <div class="cierre-card" style="text-align: left;">
      <h2 style="color: var(--accent); font-size: 1.2rem; border-bottom:1px solid var(--border); padding-bottom:0.5rem;">Desempeño Analítico</h2>
      <ul id="retro-lista" style="list-style: none; padding: 0; display: flex; flex-direction: column; gap: 1rem; margin-top:1.5rem;">
      </ul>
      <div style="margin-top: 2.5rem; text-align: center;">
        <button id="btn-reiniciar-2" class="btn btn-primary">↺ Volver a jugar</button>
      </div>
    </div>
  </main>

  <script src="js/gameEngine.js"></script>
</body>
</html>
